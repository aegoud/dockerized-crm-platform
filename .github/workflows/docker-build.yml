name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Frontend Image
      run: docker build -t crm-frontend ./frontend

    - name: Build Backend Image
      run: docker build -t crm-backend ./backend