apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-mongo
  template:
    metadata:
      labels:
        app: crm-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6
        ports:
        - containerPort: 27017